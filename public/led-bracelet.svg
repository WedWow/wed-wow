<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-med" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#d4ff47" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#d4ff47" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d4ff47" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bandGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#484848"/>
      <stop offset="50%" stop-color="#383838"/>
      <stop offset="100%" stop-color="#242424"/>
    </radialGradient>
    <radialGradient id="bandSheen" cx="50%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#5a5a5a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#d4ff47" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#d4ff47" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ambient background glow -->
  <ellipse cx="300" cy="270" rx="340" ry="250" fill="url(#bgGlow)"/>

  <!-- Inner glow (bracelet hole area) -->
  <ellipse cx="300" cy="270" rx="178" ry="60" fill="url(#innerGlow)"/>

  <!-- Outer atmosphere glow ring -->
  <ellipse cx="300" cy="270" rx="242" ry="86"
    fill="none" stroke="#d4ff47" stroke-width="22"
    opacity="0.12" filter="url(#glow-strong)"/>

  <!-- Shadow beneath bracelet -->
  <ellipse cx="300" cy="288" rx="228" ry="68" fill="#000" opacity="0.38"/>

  <!-- Main silicone band -->
  <ellipse cx="300" cy="270" rx="240" ry="84" fill="url(#bandGrad)"/>
  <!-- Inner hole (matches card background) -->
  <ellipse cx="300" cy="270" rx="178" ry="58" fill="#0a0a0a"/>

  <!-- Band sheen highlight -->
  <ellipse cx="300" cy="254" rx="200" ry="46" fill="url(#bandSheen)" opacity="0.55"/>

  <!-- Inner rim shadow -->
  <ellipse cx="300" cy="270" rx="178" ry="58"
    fill="none" stroke="#050505" stroke-width="6"/>

  <!-- Outer rim -->
  <ellipse cx="300" cy="270" rx="240" ry="84"
    fill="none" stroke="#3d3d3d" stroke-width="2"/>

  <!-- LED glow — outermost halo -->
  <ellipse cx="300" cy="270" rx="240" ry="84"
    fill="none" stroke="#d4ff47" stroke-width="22"
    opacity="0.13" filter="url(#glow-strong)"/>

  <!-- LED glow — medium -->
  <ellipse cx="300" cy="270" rx="240" ry="84"
    fill="none" stroke="#d4ff47" stroke-width="10"
    opacity="0.36" filter="url(#glow-med)"/>

  <!-- LED glow — soft inner -->
  <ellipse cx="300" cy="270" rx="240" ry="84"
    fill="none" stroke="#d4ff47" stroke-width="5"
    opacity="0.65" filter="url(#glow-soft)"/>

  <!-- LED strip (dashed neon track) -->
  <ellipse cx="300" cy="270" rx="240" ry="84"
    fill="none" stroke="#d4ff47" stroke-width="2.5"
    stroke-dasharray="14 8" opacity="0.95"
    filter="url(#glow-soft)"/>

  <!-- LED dots — top arc (points on ellipse cx=300,cy=270,rx=240,ry=84) -->
  <circle cx="300" cy="186" r="7" fill="#d4ff47" filter="url(#glow-strong)" opacity="1"/>
  <circle cx="362" cy="189" r="5" fill="#d4ff47" filter="url(#glow-med)" opacity="0.95"/>
  <circle cx="238" cy="189" r="5" fill="#d4ff47" filter="url(#glow-med)" opacity="0.95"/>
  <circle cx="420" cy="197" r="5" fill="#d4ff47" filter="url(#glow-med)" opacity="0.95"/>
  <circle cx="180" cy="197" r="5" fill="#d4ff47" filter="url(#glow-med)" opacity="0.95"/>
  <circle cx="470" cy="211" r="5" fill="#d4ff47" filter="url(#glow-med)" opacity="0.90"/>
  <circle cx="130" cy="211" r="5" fill="#d4ff47" filter="url(#glow-med)" opacity="0.90"/>

  <!-- LED dots — bottom arc (perspective, dimmer) -->
  <circle cx="300" cy="354" r="4" fill="#d4ff47" filter="url(#glow-soft)" opacity="0.45"/>
  <circle cx="420" cy="343" r="4" fill="#d4ff47" filter="url(#glow-soft)" opacity="0.40"/>
  <circle cx="180" cy="343" r="4" fill="#d4ff47" filter="url(#glow-soft)" opacity="0.40"/>
  <circle cx="470" cy="329" r="3.5" fill="#d4ff47" filter="url(#glow-soft)" opacity="0.35"/>
  <circle cx="130" cy="329" r="3.5" fill="#d4ff47" filter="url(#glow-soft)" opacity="0.35"/>

  <!-- Inner edge highlight -->
  <ellipse cx="300" cy="270" rx="178" ry="58"
    fill="none" stroke="#d4ff47" stroke-width="1.5"
    opacity="0.28" filter="url(#glow-soft)"/>

  <!-- Engraved text on band -->
  <text x="300" y="277"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="16" letter-spacing="9"
    fill="#d4ff47" text-anchor="middle" opacity="0.45"
    filter="url(#glow-soft)">WEDWOW</text>

  <!-- Sparkle top-left -->
  <g transform="translate(72, 160)" opacity="0.55">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#d4ff47" stroke-width="1.5"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#d4ff47" stroke-width="1.5"/>
    <line x1="-5.5" y1="-5.5" x2="5.5" y2="5.5" stroke="#d4ff47" stroke-width="0.8" opacity="0.5"/>
    <line x1="5.5" y1="-5.5" x2="-5.5" y2="5.5" stroke="#d4ff47" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Sparkle top-right -->
  <g transform="translate(516, 175)" opacity="0.42">
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#d4ff47" stroke-width="1.5"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#d4ff47" stroke-width="1.5"/>
  </g>

  <!-- Sparkle bottom-left -->
  <g transform="translate(62, 430)" opacity="0.36">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#d4ff47" stroke-width="1"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#d4ff47" stroke-width="1"/>
  </g>

  <!-- Floating accent dots -->
  <circle cx="95" cy="185" r="3.5" fill="#d4ff47" opacity="0.30"/>
  <circle cx="498" cy="370" r="3" fill="#d4ff47" opacity="0.22"/>
  <circle cx="540" cy="210" r="2.5" fill="#d4ff47" opacity="0.35"/>
  <circle cx="44" cy="340" r="2" fill="#d4ff47" opacity="0.22"/>
  <circle cx="300" cy="90" r="2.5" fill="#d4ff47" opacity="0.18"/>

  <!-- Orbit rings -->
  <ellipse cx="300" cy="270" rx="278" ry="114"
    fill="none" stroke="#d4ff47" stroke-width="0.8" opacity="0.08"/>
  <ellipse cx="300" cy="270" rx="300" ry="132"
    fill="none" stroke="#d4ff47" stroke-width="0.5" opacity="0.05"/>
</svg>
