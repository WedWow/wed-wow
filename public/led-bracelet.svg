<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-med" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="26" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#d4ff47" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#d4ff47" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d4ff47" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bandGrad" cx="50%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="45%" stop-color="#404040"/>
      <stop offset="100%" stop-color="#282828"/>
    </radialGradient>
    <radialGradient id="bandSheen" cx="50%" cy="15%" r="60%">
      <stop offset="0%" stop-color="#787878" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ambient background glow -->
  <ellipse cx="300" cy="340" rx="350" ry="240" fill="url(#bgGlow)"/>

  <!-- Outer halo glow ring -->
  <ellipse cx="300" cy="340" rx="260" ry="92"
    fill="none" stroke="#d4ff47" stroke-width="28"
    opacity="0.10" filter="url(#glow-strong)"/>

  <!-- Shadow beneath bracelet -->
  <ellipse cx="300" cy="360" rx="244" ry="72" fill="#000" opacity="0.45"/>

  <!-- Main silicone band -->
  <ellipse cx="300" cy="340" rx="256" ry="90" fill="url(#bandGrad)"/>
  <!-- Inner hole -->
  <ellipse cx="300" cy="340" rx="192" ry="62" fill="#0a0a0a"/>

  <!-- Band sheen highlight -->
  <ellipse cx="300" cy="322" rx="214" ry="50" fill="url(#bandSheen)" opacity="0.60"/>

  <!-- Outer rim -->
  <ellipse cx="300" cy="340" rx="256" ry="90"
    fill="none" stroke="#424242" stroke-width="2"/>

  <!-- Inner rim shadow -->
  <ellipse cx="300" cy="340" rx="192" ry="62"
    fill="none" stroke="#060606" stroke-width="5"/>

  <!-- LED glow — outermost halo -->
  <ellipse cx="300" cy="340" rx="256" ry="90"
    fill="none" stroke="#d4ff47" stroke-width="24"
    opacity="0.14" filter="url(#glow-strong)"/>

  <!-- LED glow — medium -->
  <ellipse cx="300" cy="340" rx="256" ry="90"
    fill="none" stroke="#d4ff47" stroke-width="10"
    opacity="0.42" filter="url(#glow-med)"/>

  <!-- LED glow — soft inner -->
  <ellipse cx="300" cy="340" rx="256" ry="90"
    fill="none" stroke="#d4ff47" stroke-width="5"
    opacity="0.72" filter="url(#glow-soft)"/>

  <!-- LED strip (dashed neon track) -->
  <ellipse cx="300" cy="340" rx="256" ry="90"
    fill="none" stroke="#d4ff47" stroke-width="3"
    stroke-dasharray="14 8" opacity="1"
    filter="url(#glow-soft)"/>

  <!-- LED dots — top arc -->
  <circle cx="300" cy="250" r="7" fill="#d4ff47" filter="url(#glow-strong)" opacity="1"/>
  <circle cx="366" cy="254" r="5.5" fill="#d4ff47" filter="url(#glow-med)" opacity="0.95"/>
  <circle cx="234" cy="254" r="5.5" fill="#d4ff47" filter="url(#glow-med)" opacity="0.95"/>
  <circle cx="428" cy="266" r="5" fill="#d4ff47" filter="url(#glow-med)" opacity="0.95"/>
  <circle cx="172" cy="266" r="5" fill="#d4ff47" filter="url(#glow-med)" opacity="0.95"/>
  <circle cx="480" cy="284" r="5" fill="#d4ff47" filter="url(#glow-med)" opacity="0.90"/>
  <circle cx="120" cy="284" r="5" fill="#d4ff47" filter="url(#glow-med)" opacity="0.90"/>
  <circle cx="524" cy="310" r="4" fill="#d4ff47" filter="url(#glow-soft)" opacity="0.80"/>
  <circle cx="76" cy="310" r="4" fill="#d4ff47" filter="url(#glow-soft)" opacity="0.80"/>

  <!-- LED dots — bottom arc (perspective, dimmer) -->
  <circle cx="300" cy="430" r="4.5" fill="#d4ff47" filter="url(#glow-soft)" opacity="0.40"/>
  <circle cx="366" cy="426" r="3.5" fill="#d4ff47" filter="url(#glow-soft)" opacity="0.35"/>
  <circle cx="234" cy="426" r="3.5" fill="#d4ff47" filter="url(#glow-soft)" opacity="0.35"/>
  <circle cx="428" cy="414" r="3" fill="#d4ff47" filter="url(#glow-soft)" opacity="0.30"/>
  <circle cx="172" cy="414" r="3" fill="#d4ff47" filter="url(#glow-soft)" opacity="0.30"/>

  <!-- Inner edge highlight -->
  <ellipse cx="300" cy="340" rx="192" ry="62"
    fill="none" stroke="#d4ff47" stroke-width="2"
    opacity="0.32" filter="url(#glow-soft)"/>

  <!-- WEDWOW text on band -->
  <text x="300" y="347"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="17" letter-spacing="10"
    fill="#d4ff47" text-anchor="middle" opacity="0.48"
    filter="url(#glow-soft)">WEDWOW</text>

  <!-- Sparkle top-left -->
  <g transform="translate(76, 185)" opacity="0.55">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#d4ff47" stroke-width="1.5"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#d4ff47" stroke-width="1.5"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#d4ff47" stroke-width="0.8" opacity="0.5"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#d4ff47" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Sparkle top-right -->
  <g transform="translate(514, 198)" opacity="0.42">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#d4ff47" stroke-width="1.5"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#d4ff47" stroke-width="1.5"/>
  </g>

  <!-- Floating accent dots -->
  <circle cx="88" cy="220" r="3.5" fill="#d4ff47" opacity="0.28"/>
  <circle cx="510" cy="460" r="3" fill="#d4ff47" opacity="0.22"/>
  <circle cx="548" cy="268" r="2.5" fill="#d4ff47" opacity="0.35"/>
  <circle cx="40" cy="420" r="2" fill="#d4ff47" opacity="0.22"/>
  <circle cx="300" cy="120" r="2.5" fill="#d4ff47" opacity="0.18"/>
  <circle cx="560" cy="360" r="2" fill="#d4ff47" opacity="0.15"/>

  <!-- Orbit rings -->
  <ellipse cx="300" cy="340" rx="294" ry="120"
    fill="none" stroke="#d4ff47" stroke-width="0.8" opacity="0.09"/>
  <ellipse cx="300" cy="340" rx="320" ry="138"
    fill="none" stroke="#d4ff47" stroke-width="0.5" opacity="0.06"/>
</svg>
